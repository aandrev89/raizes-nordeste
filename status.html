<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status do Pedido — Raízes do Nordeste</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

  <div id="header-principal"></div>

  <div class="pagina" style="padding-top:20px;">

    <!-- número do pedido -->
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2rem;">🧾</div>
      <h2 style="font-size:1.3rem;margin:8px 0 4px;">Pedido confirmado!</h2>
      <p style="color:#888;font-size:0.9rem;">
        Pedido <strong id="numero-pedido">#----</strong>
        · <span id="unidade-pedido"></span>
      </p>
    </div>

    <!-- barra de progresso -->
    <div class="card-raizes" style="padding:16px;margin-bottom:20px;">
      <div class="progresso-pedido" id="progresso-pedido"></div>
      <p style="text-align:center;color:#888;font-size:0.82rem;margin:8px 0 0;" id="texto-status">
        Seu pedido foi recebido e será preparado em breve...
      </p>
    </div>

    <!-- tempo estimado -->
    <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;
                background:#fff;border-radius:10px;border:1px solid var(--cor-borda);
                margin-bottom:20px;">
      <span style="font-size:1.2rem;">⏱️</span>
      <div>
        <div style="font-weight:700;font-size:0.9rem;">Tempo estimado</div>
        <div style="color:#888;font-size:0.82rem;" id="tempo-estimado">~15 minutos</div>
      </div>
    </div>

    <!-- itens do pedido -->
    <div class="card-raizes" style="padding:16px;margin-bottom:20px;">
      <div style="font-weight:700;font-size:0.9rem;margin-bottom:12px;">Seus itens</div>
      <div id="itens-pedido"></div>
    </div>

    <!-- pontos creditados (aparece quando chega em "pronto") -->
    <div id="pontos-creditados" style="display:none;background:linear-gradient(135deg,var(--cor-verde),#1a4a35);
         color:#fff;border-radius:12px;padding:16px;text-align:center;margin-bottom:20px;">
      <div style="font-size:1.5rem;margin-bottom:4px;">🌟</div>
      <div style="font-weight:700;font-size:1rem;" id="msg-pontos">Pontos creditados!</div>
      <div style="font-size:0.82rem;opacity:0.85;margin-top:4px;">
        Acumule mais para trocar por recompensas
      </div>
    </div>

    <!-- botões de ação -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <a href="fidelidade.html" class="btn-secundario" style="text-decoration:none;display:block;text-align:center;padding:12px;">
        Ver meus pontos 🌟
      </a>
      <a href="unidades.html" class="btn-raizes-outline" style="text-decoration:none;display:block;text-align:center;padding:12px;">
        Fazer novo pedido
      </a>
    </div>

  </div>

  <script src="js/mockData.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/order.js"></script>
  <script>
    renderizarHeader();

    const pedido = getPedidoAtual();
    if (!pedido) {
      window.location.href = "index.html";
    }

    document.getElementById("numero-pedido").textContent = `#${pedido.id}`;
    document.getElementById("unidade-pedido").textContent = pedido.unidade;

    // lista os itens
    document.getElementById("itens-pedido").innerHTML = pedido.itens
      .map((i) => `
        <div style="display:flex;justify-content:space-between;padding:4px 0;
                    font-size:0.85rem;border-bottom:1px solid var(--cor-borda);">
          <span>${i.nome} <span style="color:#aaa;">× ${i.quantidade}</span></span>
          <span>${formatarMoeda(i.preco * i.quantidade)}</span>
        </div>
      `)
      .join("") +
      `<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-weight:700;">
        <span>Total pago</span>
        <span style="color:var(--cor-principal);">${formatarMoeda(pedido.total)}</span>
      </div>`;

    const textosPorEtapa = [
      "Seu pedido foi recebido e será preparado em breve...",
      "Nossa equipe está preparando seu pedido com carinho 👨‍🍳",
      "Pedido pronto! Dirija-se ao balcão para retirar. 🎉",
      "Bom apetite! Até a próxima 🌵",
    ];

    function onAtualizar(pedidoAtualizado) {
      renderizarProgresso(pedidoAtualizado);
      const el = document.getElementById("texto-status");
      if (el) el.textContent = textosPorEtapa[pedidoAtualizado.etapaAtual];

      if (pedidoAtualizado.etapaAtual >= 2) {
        document.getElementById("msg-pontos").textContent =
          `+${pedidoAtualizado.pontosGanhos} pontos creditados!`;
        document.getElementById("tempo-estimado").textContent = "Pronto para retirada!";
      }
    }

    renderizarProgresso(pedido);
    simularProgressoStatus(onAtualizar);
  </script>
</body>
</html>
