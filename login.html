<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Raízes do Nordeste</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

  <div class="pagina" style="max-width:420px;padding-top:32px;">

    <div style="text-align:center;margin-bottom:32px;">
      <a href="index.html" style="font-size:2rem;text-decoration:none;">🌵</a>
      <h1 style="font-size:1.5rem;margin-top:8px;">Bem-vindo de volta!</h1>
      <p style="color:#888;font-size:0.9rem;">Entre na sua conta para fazer pedidos</p>
    </div>

    <form id="form-login" onsubmit="handleLogin(event)">
      <div style="display:flex;flex-direction:column;gap:12px;">

        <input type="email" id="campo-email" class="campo-raizes"
          placeholder="Seu email" required autocomplete="email">

        <div style="position:relative;">
          <input type="password" id="campo-senha" class="campo-raizes"
            placeholder="Sua senha" required autocomplete="current-password"
            style="padding-right:48px;">
          <button type="button" onclick="toggleSenha()"
            style="position:absolute;right:14px;top:50%;transform:translateY(-50%);
                   background:none;border:none;cursor:pointer;font-size:1.1rem;"
            id="btn-ver-senha">👁️</button>
        </div>

        <div id="erro-login" style="display:none;color:var(--cor-principal);
             font-size:0.85rem;padding:10px 14px;background:#fff3ee;
             border-radius:8px;border-left:3px solid var(--cor-principal);">
        </div>

        <button type="submit" class="btn-raizes" id="btn-entrar" style="margin-top:4px;">
          Entrar
        </button>
      </div>
    </form>

    <div style="text-align:center;margin:20px 0;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        <hr style="flex:1;border-color:var(--cor-borda);">
        <span style="color:#aaa;font-size:0.8rem;">ou</span>
        <hr style="flex:1;border-color:var(--cor-borda);">
      </div>
      <p style="font-size:0.9rem;color:#666;">
        Não tem conta?
        <a href="cadastro.html" style="color:var(--cor-principal);font-weight:700;">Criar conta grátis</a>
      </p>
    </div>

    <p style="font-size:0.75rem;color:#aaa;text-align:center;margin-top:24px;line-height:1.5;">
      Ao entrar, você concorda com nossa
      <a href="#" style="color:#888;">Política de Privacidade</a>
      e com os
      <a href="#" style="color:#888;">Termos de Uso</a>.
    </p>

    <div style="margin-top:24px;padding:14px;background:#f0f8f4;border-radius:10px;
                border:1px solid #c8e6d5;text-align:center;">
      <div style="font-size:0.8rem;color:#2D6A4F;font-weight:600;margin-bottom:4px;">
        💡 Conta de demonstração
      </div>
      <div style="font-size:0.78rem;color:#555;">
        Email: <strong>joao@email.com</strong><br>
        Senha: <strong>123456</strong>
      </div>
    </div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (getUsuarioLogado()) {
      window.location.href = "unidades.html";
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("campo-email").value.trim();
      const senha = document.getElementById("campo-senha").value;
      const elErro = document.getElementById("erro-login");
      const btn = document.getElementById("btn-entrar");

      btn.textContent = "Entrando...";
      btn.disabled = true;

      setTimeout(() => {
        const resultado = login(email, senha);
        if (resultado.ok) {
          window.location.href = "unidades.html";
        } else {
          elErro.textContent = resultado.erro;
          elErro.style.display = "block";
          btn.textContent = "Entrar";
          btn.disabled = false;
        }
      }, 600);
    }

    function toggleSenha() {
      const campo = document.getElementById("campo-senha");
      const btn = document.getElementById("btn-ver-senha");
      campo.type = campo.type === "password" ? "text" : "password";
      btn.textContent = campo.type === "password" ? "👁️" : "🙈";
    }
  </script>
</body>
</html>
