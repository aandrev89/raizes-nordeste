<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raízes do Nordeste</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .hero {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--cor-escura) 0%, #3a2a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }

    /* padrão geométrico de fundo estilo azulejo nordestino */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(200,75,17,0.08) 0, rgba(200,75,17,0.08) 1px, transparent 0, transparent 50%),
        repeating-linear-gradient(-45deg, rgba(236,173,53,0.05) 0, rgba(236,173,53,0.05) 1px, transparent 0, transparent 50%);
      background-size: 30px 30px;
    }

    .logo-emoji {
      font-size: 4rem;
      margin-bottom: 8px;
      position: relative;
    }

    .logo-texto {
      font-family: var(--fonte-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--cor-secundaria);
      position: relative;
    }

    .tagline {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      margin: 8px 0 40px;
      position: relative;
    }

    .ctas {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    /* modal de cookies */
    .banner-cookies {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--cor-escura);
      color: #fff;
      padding: 16px 20px;
      z-index: 200;
      border-top: 3px solid var(--cor-principal);
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="logo-emoji">🌵</div>
    <div class="logo-texto">Raízes do Nordeste</div>
    <p class="tagline">Sabor nordestino onde você estiver</p>

    <div class="ctas">
      <button class="btn-raizes" onclick="irParaPedido()">
        Fazer Pedido
      </button>
      <a href="login.html" class="btn-raizes-outline" style="text-decoration:none;display:block;text-align:center;padding:12px 24px;">
        Entrar na Minha Conta
      </a>
    </div>

    <!-- destaques rápidos -->
    <div style="margin-top:48px;display:flex;gap:24px;position:relative;">
      <div style="text-align:center;">
        <div style="font-size:1.6rem;">🌽</div>
        <div style="font-size:0.7rem;color:rgba(255,255,255,0.6);margin-top:4px;">Cuscuz</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:1.6rem;">🫓</div>
        <div style="font-size:0.7rem;color:rgba(255,255,255,0.6);margin-top:4px;">Tapioca</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:1.6rem;">🥤</div>
        <div style="font-size:0.7rem;color:rgba(255,255,255,0.6);margin-top:4px;">Sucos</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:1.6rem;">🍮</div>
        <div style="font-size:0.7rem;color:rgba(255,255,255,0.6);margin-top:4px;">Doces</div>
      </div>
    </div>
  </section>

  <!-- banner de cookies LGPD — aparece só no primeiro acesso -->
  <div class="banner-cookies" id="banner-cookies" style="display:none;">
    <p style="font-size:0.85rem;margin-bottom:12px;">
      🍪 Usamos cookies para melhorar sua experiência e personalizar o conteúdo.
      Ao continuar, você concorda com nossa
      <a href="#" style="color:var(--cor-secundaria);">Política de Privacidade</a>.
    </p>
    <div style="display:flex;gap:8px;">
      <button class="btn-raizes" style="width:auto;padding:8px 20px;font-size:0.85rem;"
        onclick="aceitarCookies()">Aceitar</button>
      <button onclick="recusarCookies()"
        style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;
               border-radius:50px;padding:8px 16px;font-size:0.85rem;cursor:pointer;">
        Só essenciais
      </button>
    </div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // se já está logado, vai direto pra seleção de unidade
    const usuarioJaLogado = getUsuarioLogado();
    if (usuarioJaLogado) {
      // não redireciona automaticamente — deixa o usuário clicar
      // mas troca o botão de fazer pedido pra ficar mais fluido
    }

    function irParaPedido() {
      window.location.href = "unidades.html";
    }

    // banner de cookies aparece só se nunca aceitou/recusou
    if (!localStorage.getItem("cookiesDecisao")) {
      document.getElementById("banner-cookies").style.display = "block";
    }

    function aceitarCookies() {
      localStorage.setItem("cookiesDecisao", "aceito");
      document.getElementById("banner-cookies").style.display = "none";
    }

    function recusarCookies() {
      localStorage.setItem("cookiesDecisao", "essenciais");
      document.getElementById("banner-cookies").style.display = "none";
    }
  </script>
</body>
</html>
