<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelidade — Raízes do Nordeste</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

  <div id="header-principal"></div>

  <div class="pagina" style="padding-top:16px;">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <a href="perfil.html" style="font-size:1.4rem;text-decoration:none;">←</a>
      <h2 style="font-size:1.3rem;margin:0;">Minha Fidelidade</h2>
    </div>

    <!-- card de saldo -->
    <div class="card-pontos" style="margin-bottom:20px;">
      <div style="font-size:0.85rem;opacity:0.7;margin-bottom:4px;">Seu saldo</div>
      <div class="saldo" id="saldo-pontos">0</div>
      <div class="nivel" id="nivel-usuario">Membro Bronze</div>

      <div class="barra-progresso-pontos">
        <div class="preenchimento" id="barra-nivel" style="width:0%"></div>
      </div>
      <div id="meta-pontos" style="font-size:0.78rem;opacity:0.7;">Carregando...</div>

      <div style="font-size:0.78rem;opacity:0.6;margin-top:12px;">
        💡 Cada R$ 1,00 gasto = 1 ponto
      </div>
    </div>

    <!-- aviso de uso de dados (LGPD) -->
    <div style="background:#fffbeb;border:1px solid #f0d060;border-radius:10px;
                padding:12px 14px;font-size:0.78rem;color:#856404;margin-bottom:20px;">
      ℹ️ Seu histórico de consumo é usado para personalizar recompensas.
      Você pode desativar isso em
      <a href="perfil.html" style="color:#856404;font-weight:700;">Meu Perfil → Privacidade</a>.
    </div>

    <!-- recompensas -->
    <div style="font-weight:700;font-size:0.95rem;margin-bottom:12px;">Recompensas disponíveis</div>
    <div id="grid-recompensas"
      style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;">
    </div>

    <!-- histórico -->
    <div style="font-weight:700;font-size:0.95rem;margin-bottom:12px;">Histórico de pontos</div>
    <div id="historico-pontos"></div>

  </div>

  <!-- modal de confirmação de resgate -->
  <div id="modal-resgate" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
       z-index:300;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:8px;" id="modal-emoji"></div>
      <h3 style="font-size:1.1rem;margin-bottom:8px;" id="modal-nome"></h3>
      <p style="font-size:0.85rem;color:#666;margin-bottom:16px;" id="modal-desc"></p>
      <div style="font-size:0.9rem;color:var(--cor-principal);font-weight:700;margin-bottom:20px;"
           id="modal-custo"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="fecharModal()"
          style="flex:1;background:none;border:1.5px solid var(--cor-borda);border-radius:50px;
                 padding:10px;cursor:pointer;font-weight:600;">
          Cancelar
        </button>
        <button id="btn-confirmar-resgate"
          style="flex:1;background:var(--cor-verde);color:#fff;border:none;border-radius:50px;
                 padding:10px;cursor:pointer;font-weight:700;">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/loyalty.js"></script>
  <script>
    renderizarHeader();
    guardRota();
    renderizarFidelidade();

    let recompensaParaResgatar = null;

    function confirmarResgate(id) {
      const recompensa = recompensas.find((r) => r.id === id);
      if (!recompensa) return;

      recompensaParaResgatar = id;
      document.getElementById("modal-emoji").textContent = recompensa.emoji;
      document.getElementById("modal-nome").textContent = recompensa.nome;
      document.getElementById("modal-desc").textContent = recompensa.descricao;
      document.getElementById("modal-custo").textContent = `Custo: ${recompensa.pontos} pontos`;

      const modal = document.getElementById("modal-resgate");
      modal.style.display = "flex";

      document.getElementById("btn-confirmar-resgate").onclick = () => {
        const resultado = resgatar(recompensaParaResgatar);
        fecharModal();
        if (resultado.ok) {
          toast(`${resultado.recompensa.nome} resgatado com sucesso! 🎉`, "sucesso");
          renderizarFidelidade();
        } else {
          toast(resultado.erro, "erro");
        }
      };
    }

    function fecharModal() {
      document.getElementById("modal-resgate").style.display = "none";
      recompensaParaResgatar = null;
    }

    // fecha modal clicando fora
    document.getElementById("modal-resgate").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) fecharModal();
    });
  </script>
</body>
</html>
